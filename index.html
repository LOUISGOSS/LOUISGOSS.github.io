<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resizable Owl with Sci-Fi ENTER</title>

  <!-- Orbitron for that tech-y look -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* 1) Full-screen background boilerplate */
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { width: 100%; height: 100% }
    html {
      background: url("Possible background.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: none;
      font-family: 'Orbitron', sans-serif;
    }

    /* 2) Size & spacing controls */
    :root {
      --owl-width:   400px; /* ← adjust owl width here */
      --enter-gap:   8px;   /* ← adjust gap between owl & ENTER */
    }

    /* 3) Owl fade-in with custom sizing */
    .owl {
      max-width: none;
      width: var(--owl-width);
      height: auto;
      opacity: 0;
      animation: fadeInOwl 1s ease-in-out 2s forwards;
    }
    @keyframes fadeInOwl {
      from { opacity: 0 }
      to   { opacity: 1 }
    }

    /* 4) ENTER fade-in + smooth pulse, with tighter gap */
    .enter {
      margin-top: var(--enter-gap);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #0ff;
      text-shadow:
        0 0 8px rgba(0,255,255,0.7),
        0 0 16px rgba(0,255,255,0.5),
        0 0 24px rgba(0,255,255,0.3);
      opacity: 0;
      cursor: pointer;
      animation:
        fadeInEnter 1s ease-in-out 3s forwards,
        pulse       2s ease-in-out 4s infinite;
    }
    @keyframes fadeInEnter {
      from { opacity: 0 }
      to   { opacity: 1 }
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        text-shadow:
          0 0 8px rgba(0,255,255,0.7),
          0 0 16px rgba(0,255,255,0.5),
          0 0 24px rgba(0,255,255,0.3);
      }
      50% {
        transform: scale(1.1);
        text-shadow:
          0 0 12px rgba(0,255,255,0.9),
          0 0 24px rgba(0,255,255,0.7),
          0 0 36px rgba(0,255,255,0.5);
      }
    }
  </style>
</head>
<body>
  <!-- Owl fades in at 2s, size from --owl-width -->
  <img src="Clean_Owl_101.png" alt="Owl" class="owl">

  <!-- ENTER now sits 8px below the owl and pulses -->
  <div class="enter">ENTER</div>
</body>
</html>
